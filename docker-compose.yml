version: '3.8'

services:
  db:
    image: postgres:15
    container_name: aw-postgres
    restart: always
    environment:
      POSTGRES_USER: aw_user
      POSTGRES_PASSWORD: aw_password
      POSTGRES_DB: aw_db
    ports:
      - "5432:5432"
    volumes:
      - aw_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aw_user -d aw_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aw-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - aw_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: aw-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aw_user:aw_password@db:5432/aw_db
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    container_name: aw-web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api


volumes:
  aw_postgres_data:
  aw_redis_data:
